<!DOCTYPE html>
<html>
<head>
  <title>Gallery - Hadiqatul Eman Private School</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f8f5;
      color: #1f2d24;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #007a3d, #0b5f32);
      color: white;
      padding: 18px 50px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      background: white;
      object-fit: cover;
      padding: 5px;
    }

    .header-text h1 {
      margin: 0;
      font-size: 36px;
    }

    .header-text p {
      margin: 8px 0 0;
      font-size: 18px;
    }

    nav {
      background: white;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    nav a {
      margin: 15px;
      color: #007a3d;
      text-decoration: none;
      font-weight: bold;
      font-size: 17px;
    }

    nav a:hover {
      color: #0b5f32;
      text-decoration: underline;
    }

    section {
      padding: 35px;
      max-width: 1100px;
      margin: auto;
      flex: 1;
    }

    h2 {
      text-align: center;
      color: #007a3d;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin-top: 20px;
    }

    .gallery img {
      width: 300px;
      height: 210px;
      object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }

    footer {
      background: #0b5f32;
      color: white;
      text-align: center;
      padding: 22px;
      margin-top: auto;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <img src="images/1.jpg" class="logo">
    <div class="header-text">
      <h1>Gallery</h1>
      <p>Moments from our school and student activities</p>
    </div>
  </header>

  <!-- NAV -->
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="academics.html">Academics</a>
    <a href="admissions.html">Admissions</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- GALLERY -->
  <section>
    <h2>Our School Activities</h2>

    <div class="gallery">
      <img src="images/1.jpg">
      <img src="images/2.jpg">
      <img src="images/3.jpg">
      <img src="images/4.jpg">
      <img src="images/5.jpg">
      <img src="images/6.jpg">
      <img src="images/7.jpg">
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Hadiqatul Eman Private School. All rights reserved.</p>
  </footer>

</body>
</html>
